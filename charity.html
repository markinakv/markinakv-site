<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
  <meta name="design_doc_mode" content="page">
  <style>
    body { margin: 0; }
    a { color: inherit; text-decoration: none; border-bottom: 1px solid currentColor; opacity: 0.75; }
    a:hover { opacity: 1; }
    @media (max-width: 720px) {
      .mk-grid { grid-template-columns: 1fr !important; }
      .mk-side { position: static !important; }
    }
  </style>
</helmet>
<div style="background: oklch(0.98 0.006 90); min-height: 100vh; color: oklch(0.22 0.01 90); font-family: -apple-system, 'Helvetica Neue', Helvetica, Arial, sans-serif; display: flex; flex-direction: column; align-items: center;">
  <div style="width: 100%; max-width: 880px; padding: 32px 24px 0;">
    <a href="./index.html" style="font-family: 'IBM Plex Mono', ui-monospace, SFMono-Regular, monospace; font-size: 11px; color: oklch(0.55 0.03 90); border-bottom: none;">{{ backLabel }}</a>
  </div>
  <div class="mk-grid" style="width: 100%; max-width: 880px; padding: 24px 24px 56px; display: grid; grid-template-columns: 280px 1fr; gap: 48px; align-items: start;">

    <div class="mk-side" style="position: sticky; top: 56px; display: flex; flex-direction: column; gap: 16px;">
      <div>
        <h1 style="font-size: 22px; font-weight: 600; margin: 0 0 6px; letter-spacing: -0.01em;">{{ heading }}</h1>
      </div>
      <button onClick="{{ toggleLang }}" style="align-self: flex-start; font-family: 'IBM Plex Mono', ui-monospace, SFMono-Regular, monospace; font-size: 12px; letter-spacing: 0.03em; background: none; border: 1px solid oklch(0.7 0.02 90); border-radius: 20px; padding: 5px 12px; cursor: pointer; color: oklch(0.4 0.05 150);">{{ langSwitchLabel }}</button>

      <div>
        <div style="font-family: 'IBM Plex Mono', ui-monospace, SFMono-Regular, monospace; font-size: 11px; letter-spacing: 0.05em; text-transform: uppercase; color: oklch(0.55 0.03 90); margin-bottom: 8px;">{{ ctaHeading }}</div>
        <sc-for list="{{ ctas }}" as="cta" hint-placeholder-count="2">
          <a href="{{ cta.href }}" style="display: block; padding: 6px 0; border-bottom: 1px solid oklch(0.9 0.006 90);">
            <div style="font-size: 13px;">{{ cta.label }}</div>
            <div style="font-family: 'IBM Plex Mono', ui-monospace, SFMono-Regular, monospace; font-size: 11px; color: oklch(0.55 0.03 90);">{{ cta.tag }}</div>
          </a>
        </sc-for>
      </div>
    </div>

    <div>
      <p style="font-size: 15px; line-height: 1.6; color: oklch(0.3 0.01 90); margin: 0 0 24px;">{{ placeholderText }}</p>

      <div style="margin-bottom: 24px;">
        <div style="font-family: 'IBM Plex Mono', ui-monospace, SFMono-Regular, monospace; font-size: 11px; letter-spacing: 0.05em; text-transform: uppercase; color: oklch(0.55 0.03 90); margin-bottom: 8px;">{{ projectsHeading }}</div>
        <sc-for list="{{ projects }}" as="p" hint-placeholder-count="3">
          <div style="padding: 12px 0; border-bottom: 1px solid oklch(0.9 0.006 90);">
            <div style="display: flex; justify-content: space-between; align-items: baseline; gap: 16px;">
              <a href="{{ p.href }}" target="_blank" rel="noopener" style="font-size: 15px; max-width: 40%;">{{ p.label }}</a>
              <span style="font-family: 'IBM Plex Mono', ui-monospace, SFMono-Regular, monospace; font-size: 11px; color: oklch(0.55 0.03 90); flex-shrink: 0;">{{ p.tag }}</span>
            </div>
            <p style="font-size: 13px; line-height: 1.5; color: oklch(0.45 0.01 90); margin: 4px 0 0;">{{ p.description }}</p>
          </div>
        </sc-for>
      </div>

    </div>

    <div style="grid-column: 1 / -1; padding-top: 16px; border-top: 1px solid oklch(0.9 0.006 90); display: flex; justify-content: flex-end; font-family: 'IBM Plex Mono', ui-monospace, SFMono-Regular, monospace; font-size: 11px; color: oklch(0.6 0.02 90);">
      <span>markinakv.com</span>
    </div>

  </div>
</div>

</x-dc>
<script type="text/x-dc" data-dc-script>
const COPY = {
  ru: {
    backLabel: '← на главную',
    langSwitchLabel: 'EN',
    heading: 'Благотворительные проекты в сфере образования и медицины',
    placeholderText: 'Я участвовала в открытии и продолжаю поддерживать несколько благотворительных проектов в сфере доступности образования и медицины.',
    projectsHeading: 'Проекты',
    projects: [
      { label: 'tabor.school', tag: 'Кения', href: 'https://tabor.school/', description: 'Мы обучаем самых бедных детей в крупнейшем трущобном районе Африки.' },
      { label: 'kilicenter.com', tag: 'Кения', href: 'https://kilicenter.com/', description: 'Kili Kid\u2019s Center — безопасное пространство для самых маленьких жителей Кибера, крупнейшего района трущоб Найроби.' },
      { label: 'heha.school', tag: 'Бурунди', href: 'https://heha.school/', description: 'Начальная школа, работающая по официальной образовательной программе.' },
    ],
    ctaHeading: 'Связаться',
    ctas: [
      { label: 'обсудить благотворительные проекты', tag: 'charity@markinakv.com', href: 'mailto:charity@markinakv.com' },
      { label: 'узнать про волонтерские программы', tag: 'volunteer@markinakv.com', href: 'mailto:volunteer@markinakv.com' },
    ],
  },
  en: {
    backLabel: '← home',
    langSwitchLabel: 'RU',
    heading: 'Charitable projects in education and healthcare',
    placeholderText: 'I helped launch and continue to support several charitable projects focused on access to education and healthcare.',
    projectsHeading: 'Projects',
    projects: [
      { label: 'tabor.school', tag: 'Kenya', href: 'https://tabor.school/', description: 'We educate the poorest children in the biggest African slum.' },
      { label: 'kilicenter.com', tag: 'Kenya', href: 'https://kilicenter.com/', description: 'Kili Kid\u2019s Center is a safe space for the youngest residents of Kibera, Nairobi\u2019s largest slum.' },
      { label: 'heha.school', tag: 'Burundi', href: 'https://heha.school/', description: 'A primary school that follows the official Burundian educational program.' },
    ],
    ctaHeading: 'Contact',
    ctas: [
      { label: 'discuss a joint charity project', tag: 'charity@markinakv.com', href: 'mailto:charity@markinakv.com' },
      { label: 'ask about volunteering programs', tag: 'volunteer@markinakv.com', href: 'mailto:volunteer@markinakv.com' },
    ],
  },
};

class Component extends DCLogic {
  state = { lang: 'ru' };
  renderVals() {
    const t = COPY[this.state.lang];
    return { ...t, toggleLang: () => this.setState(s => ({ lang: s.lang === 'ru' ? 'en' : 'ru' })) };
  }
}

</script>
</body>
</html>
