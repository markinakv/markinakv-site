<body>
<x-dc>
<helmet>
  <meta name="design_doc_mode" content="page">
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body { margin: 0; }
    a { color: inherit; text-decoration: none; border-bottom: 1px solid currentColor; opacity: 0.75; }
    a:hover { opacity: 1; }
    @media (max-width: 720px) {
      .mk-grid { grid-template-columns: 1fr !important; }
      .mk-side { position: static !important; }
    }
  </style>
</helmet>
<div style="background: oklch(0.98 0.006 90); min-height: 100vh; color: oklch(0.22 0.01 90); font-family: -apple-system, 'Helvetica Neue', Helvetica, Arial, sans-serif; display: flex; flex-direction: column; align-items: center;">
  <div style="width: 100%; max-width: 880px; padding: 32px 24px 0;">
    <a href="./index.html" style="font-family: 'IBM Plex Mono', ui-monospace, SFMono-Regular, monospace; font-size: 11px; color: oklch(0.55 0.03 90); border-bottom: none;">{{ backLabel }}</a>
  </div>
  <div class="mk-grid" style="width: 100%; max-width: 880px; padding: 24px 24px 56px; display: grid; grid-template-columns: 280px 1fr; gap: 48px; align-items: start;">

    <div class="mk-side" style="position: sticky; top: 56px; display: flex; flex-direction: column; gap: 16px;">
      <div>
        <h1 style="font-size: 22px; font-weight: 600; margin: 0 0 6px; letter-spacing: -0.01em;">{{ heading }}</h1>
        <div style="font-size: 13px; color: oklch(0.4 0.05 150); line-height: 1.4;">{{ tagline }}</div>
      </div>
      <button onClick="{{ toggleLang }}" style="align-self: flex-start; font-family: 'IBM Plex Mono', ui-monospace, SFMono-Regular, monospace; font-size: 12px; letter-spacing: 0.03em; background: none; border: 1px solid oklch(0.7 0.02 90); border-radius: 20px; padding: 5px 12px; cursor: pointer; color: oklch(0.4 0.05 150);">{{ langSwitchLabel }}</button>
    </div>

    <div>
      <div style="border: 1px dashed oklch(0.75 0.02 90); border-radius: 12px; padding: 32px 24px; text-align: center;">
        <p style="font-size: 15px; line-height: 1.6; color: oklch(0.45 0.01 90); margin: 0;">{{ placeholderText }}</p>
      </div>
    </div>

  </div>
</div>

</x-dc>
<script type="text/x-dc" data-dc-script>
const COPY = {
  ru: {
    backLabel: '← на главную',
    langSwitchLabel: 'EN',
    heading: 'Growth Operation Management',
    tagline: 'CV и проекты',
    placeholderText: 'Раздел в разработке — скоро здесь появится CV и описание опыта.',
  },
  en: {
    backLabel: '← home',
    langSwitchLabel: 'RU',
    heading: 'Growth Operation Management',
    tagline: 'CV and projects',
    placeholderText: 'Coming soon — CV and experience details will be added here.',
  },
};

class Component extends DCLogic {
  state = { lang: 'ru' };
  renderVals() {
    const t = COPY[this.state.lang];
    return { ...t, toggleLang: () => this.setState(s => ({ lang: s.lang === 'ru' ? 'en' : 'ru' })) };
  }
}

</script>
</body>
</html>
